<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Show — HorseShowCalendar.com</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/app.css">
  <style>
    .sub-tabs { display:flex; gap:4px; border-bottom:1px solid var(--border); margin:14px 0 22px; overflow-x:auto; }
    .sub-tab { padding:10px 16px; border:0; background:none; cursor:pointer; border-bottom:3px solid transparent; color:var(--text-medium); font-weight:600; white-space:nowrap; }
    .sub-tab.active { color:var(--teal); border-bottom-color:var(--teal); }
    .sub-panel { display:none; }
    .sub-panel.active { display:block; }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="app-side">
      <div class="app-side-logo">
        <a href="../index.html">&#128197; HorseShowCalendar</a>
        <div class="role-tag">Manager</div>
      </div>
      <nav class="app-side-nav">
        <h4>Run a Show</h4>
        <a href="dashboard.html">Dashboard</a>
        <a href="show-edit.html" class="active">Show Editor</a>
      </nav>
      <div class="app-side-foot">
        <div id="userName" style="font-size:.85rem;color:rgba(255,255,255,.65);margin-bottom:6px;"></div>
        <button id="logoutBtn">Log out</button>
      </div>
    </aside>

    <main class="app-main">
      <div class="app-topbar">
        <div>
          <h1 id="showTitle">New Show</h1>
          <div class="ctx" id="showCtx"></div>
        </div>
        <a href="dashboard.html" class="btn btn-ghost btn-sm">← Back</a>
      </div>

      <div class="sub-tabs" id="showSubTabs">
        <button class="sub-tab active" data-tab="general" type="button">General</button>
        <button class="sub-tab" data-tab="rings" type="button">Rings</button>
        <button class="sub-tab" data-tab="divisions" type="button">Divisions</button>
        <button class="sub-tab" data-tab="classes" type="button">Classes</button>
        <button class="sub-tab" data-tab="entries" type="button">Entries</button>
        <button class="sub-tab" data-tab="finance" type="button">Financials</button>
        <button class="sub-tab" data-tab="announcements" type="button">Announcements</button>
      </div>

      <div id="showSubPanels">
        <section class="sub-panel active" id="subpanel-general">
          <form id="showForm" class="card">
            <h2>Show Details</h2>
            <div class="form-grid">
              <label class="span-2">Show Name<input name="name" required></label>
              <label>Discipline
                <select name="discipline" required>
                  <option value="">Select…</option>
                  <option>Hunter/Jumper</option>
                  <option>Dressage</option>
                  <option>Eventing</option>
                  <option>Western</option>
                  <option>Reining</option>
                  <option>Barrel Racing</option>
                  <option>Breed Shows</option>
                  <option>Polo</option>
                  <option>Driving</option>
                  <option>Combined Test</option>
                </select>
              </label>
              <label>Region
                <select name="region">
                  <option value="">—</option>
                  <option>Northeast</option><option>Southeast</option><option>Midwest</option>
                  <option>Southwest</option><option>West</option><option>Northwest</option>
                </select>
              </label>
              <label>Start Date<input name="start_date" type="date" required></label>
              <label>End Date<input name="end_date" type="date" required></label>
              <label class="span-2">Venue Name<input name="venue_name"></label>
              <label class="span-2">Address<input name="venue_address"></label>
              <label>City<input name="city"></label>
              <label>State<input name="state" maxlength="2"></label>
              <label>ZIP<input name="zip"></label>
              <label>Website<input name="website" type="url"></label>
              <label>Contact Email<input name="contact_email" type="email"></label>
              <label>Contact Phone<input name="contact_phone"></label>
              <label class="span-2">Description<textarea name="description"></textarea></label>
            </div>

            <h3 style="margin-top:24px;">Status &amp; Visibility</h3>
            <div class="form-grid">
              <label>Status
                <select name="status">
                  <option value="draft">Draft (private)</option>
                  <option value="open">Open for Entries</option>
                  <option value="closed">Entries Closed</option>
                  <option value="live">Live</option>
                  <option value="completed">Completed</option>
                  <option value="cancelled">Cancelled</option>
                </select>
              </label>
              <label>Visibility
                <select name="visibility">
                  <option value="public">Public (on calendar)</option>
                  <option value="unlisted">Unlisted (link only)</option>
                  <option value="private">Private (staff only)</option>
                </select>
              </label>
              <label>Entries Open At<input name="entries_open_at" id="entries_open_at" type="datetime-local"></label>
              <label>Entries Close At<input name="entries_close_at" id="entries_close_at" type="datetime-local"></label>
              <label>Late Fee After<input name="late_fee_after" id="late_fee_after" type="datetime-local"></label>
              <label>Late Fee Amount<input name="late_fee_amount" type="number" step="0.01" value="0"></label>
            </div>

            <h3 style="margin-top:24px;">Standard Fees</h3>
            <div class="form-grid">
              <label>Office Fee<input name="office_fee" type="number" step="0.01" value="0"></label>
              <label>Drug Fee<input name="drug_fee" type="number" step="0.01" value="0"></label>
              <label>USEF Fee<input name="usef_fee" type="number" step="0.01" value="0"></label>
              <label>Stall Fee<input name="stall_fee" type="number" step="0.01" value="0"></label>
              <label>Haul-In Fee<input name="haul_in_fee" type="number" step="0.01" value="0"></label>
              <label>Total Prize Money<input name="prize_money_total" type="number" step="0.01" value="0"></label>
            </div>

            <h3 style="margin-top:24px;">External IDs</h3>
            <div class="form-grid">
              <label>USEF Competition ID<input name="usef_competition_id"></label>
              <label>USHJA Competition ID<input name="ushja_competition_id"></label>
            </div>

            <div class="form-actions">
              <button type="button" id="deleteShowBtn" class="btn btn-danger" style="margin-right:auto;">Delete Show</button>
              <button type="submit" class="btn btn-primary">Save</button>
            </div>
          </form>
        </section>

        <section class="sub-panel" id="subpanel-rings">
          <div class="section-h"><h2>Rings</h2><div class="actions"><button id="addRingBtn" class="btn btn-primary btn-sm">+ Add Ring</button></div></div>
          <div id="ringsList"></div>
        </section>

        <section class="sub-panel" id="subpanel-divisions">
          <div class="section-h"><h2>Divisions</h2><div class="actions"><button id="addDivBtn" class="btn btn-primary btn-sm">+ Add Division</button></div></div>
          <div id="divsList"></div>
        </section>

        <section class="sub-panel" id="subpanel-classes">
          <div class="section-h"><h2>Classes</h2><div class="actions"><button id="addClassBtn" class="btn btn-primary btn-sm">+ Add Class</button></div></div>
          <div id="classesList"></div>
        </section>

        <section class="sub-panel" id="subpanel-entries">
          <div class="section-h"><h2>Entries</h2></div>
          <div id="entriesList"></div>
        </section>

        <section class="sub-panel" id="subpanel-finance">
          <div class="section-h"><h2>Financials</h2><div class="actions"><button id="exportFinanceBtn" class="btn btn-ghost btn-sm">Export CSV</button></div></div>
          <div class="stat-grid" id="financeStats"></div>
          <div id="financeList"></div>
        </section>

        <section class="sub-panel" id="subpanel-announcements">
          <div class="section-h"><h2>Announcements</h2><div class="actions"><button id="addAnnBtn" class="btn btn-primary btn-sm">+ Post Announcement</button></div></div>
          <div id="announcementsList"></div>
        </section>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/shared.js"></script>
  <script>window.PAGE = 'showEdit';</script>
  <script src="../js/manager.js"></script>
</body>
</html>
